<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      (function () {
        var pathname = window.location.pathname.replace(/\/index\.html?$/i, "");
        if (pathname.slice(-1) !== "/") {
          pathname += "/";
        }
        var baseEl = document.createElement("base");
        baseEl.href = window.location.origin + pathname;
        var anchor = document.currentScript;
        anchor.parentNode.insertBefore(baseEl, anchor.nextSibling);
      })();
    </script>
    <title>Motion Asset Share</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"
      crossorigin
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="header">
      <div>
        <h1>Motion Asset Library</h1>
      </div>
      <a class="repo-link" href="#" id="repoLink" target="_blank" rel="noreferrer">저장소 열기</a>
    </header>

    <main>
      <section class="toolbar">
        <select id="typeFilter" aria-label="타입 필터">
          <option value="all">전체 타입</option>
          <option value="json">JSON</option>
          <option value="apng">APNG</option>
        </select>
        <input
          id="searchInput"
          type="search"
          placeholder="제목 또는 태그 검색"
          aria-label="에셋 검색"
        />
      </section>

      <section id="assetGrid" class="asset-grid" aria-live="polite"></section>
      <p id="emptyState" class="empty-state hidden">표시할 에셋이 없습니다.</p>
    </main>

    <template id="assetCardTemplate">
      <article class="asset-card" tabindex="0">
        <div class="preview-area"></div>
        <a class="download-overlay" href="#" download aria-label="파일 다운로드">다운로드</a>
        <div class="card-body">
          <div class="card-top">
            <h2 class="asset-title"></h2>
            <span class="asset-type"></span>
          </div>
          <div class="tag-list"></div>
          <div class="shared-note-box">
            <p class="shared-note"></p>
          </div>
        </div>
      </article>
    </template>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
    <script src="./app.js" type="module"></script>
  </body>
</html>
