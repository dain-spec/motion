<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      (function () {
        var pathname = window.location.pathname.replace(/\/index\.html?$/i, "");
        if (pathname.slice(-1) !== "/") {
          pathname += "/";
        }
        var baseEl = document.createElement("base");
        baseEl.href = window.location.origin + pathname;
        var anchor = document.currentScript;
        anchor.parentNode.insertBefore(baseEl, anchor.nextSibling);
      })();
    </script>
    <title>Motion Asset Share</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"
      crossorigin
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="header">
      <div class="header-title">
        <h1>Motion Asset Library</h1>
      </div>
      <div class="header-actions">
        <input
          id="searchInput"
          class="header-search"
          type="search"
          placeholder="제목 또는 태그 검색"
          aria-label="에셋 검색"
        />
        <a class="repo-link" href="#" id="repoLink" target="_blank" rel="noreferrer">
          저장소 열기
          <img
            class="repo-link-icon"
            src="./assets/ic_arrow_lean.svg"
            alt=""
            width="16"
            height="16"
            aria-hidden="true"
          />
        </a>
      </div>
    </header>

    <main>
      <section class="category-tabs" aria-label="카테고리 탭">
        <button type="button" class="category-tab active" data-category="all" data-tab-label="전체">전체</button>
        <button type="button" class="category-tab" data-category="loader" data-tab-label="Loader">Loader</button>
        <button type="button" class="category-tab" data-category="icon" data-tab-label="Icon">Icon</button>
        <button type="button" class="category-tab" data-category="dobi" data-tab-label="Dobi">Dobi</button>
      </section>

      <section id="assetGrid" class="asset-grid" aria-live="polite"></section>
      <p id="emptyState" class="empty-state hidden">표시할 에셋이 없습니다.</p>
    </main>

    <dialog id="colorEditDialog" class="color-edit-dialog" aria-label="색상 수정">
      <div class="color-edit-dialog-surface">
        <button type="button" class="color-edit-dialog-close" id="colorEditClose" aria-label="닫기">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M6 6L18 18M18 6L6 18" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
          </svg>
        </button>

        <div class="color-edit-dialog-main">
          <div class="color-edit-toggle-row">
            <span class="color-edit-toggle-label" id="colorEditThemeLabel">Dark</span>
            <button
              type="button"
              class="color-edit-theme-switch"
              id="colorEditThemeToggle"
              role="switch"
              aria-checked="true"
              aria-labelledby="colorEditThemeLabel"
            >
              <span class="color-edit-theme-switch-track" aria-hidden="true">
                <span class="color-edit-theme-switch-thumb"></span>
              </span>
            </button>
          </div>

          <div class="color-edit-preview-stack">
            <div id="colorEditDialogPreview" class="color-edit-dialog-preview-area"></div>
            <p id="colorEditFileName" class="color-edit-filename"></p>
          </div>

          <div id="colorEditFields" class="color-edit-swatch-row" role="group" aria-label="색상"></div>
        </div>

        <p id="colorEditError" class="color-edit-error hidden" role="alert"></p>

        <div class="color-edit-dialog-footer">
          <div class="color-edit-footer-buttons">
            <button type="button" class="color-edit-footer-btn" id="colorEditCancel">취소</button>
            <button type="button" class="color-edit-footer-btn color-edit-footer-btn--download" id="colorEditDownload">
              <img class="color-edit-footer-btn-icon" src="./assets/ic_download.svg" alt="" width="14" height="14" />
              JSON 다운로드
            </button>
          </div>
          <p class="color-edit-figma-hint">
            Lottie JSON은 Figma에 붙여넣어도 벡터 도형으로 변환되지 않습니다. 아래 버튼은 다이얼로그 미리보기와 동일한
            <strong>SVG 마크업</strong>을 클립보드에 넣으며, Figma·OS에 따라 한 번에 벡터로 붙여넣기 될 수 있습니다.
          </p>
          <button type="button" class="color-edit-figma-copy" id="colorEditCopyFigma">
            <svg
              class="color-edit-figma-icon"
              width="16"
              height="16"
              viewBox="0 0 16 16"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
              aria-hidden="true"
            >
              <path d="M5.33 10.67a2.33 2.33 0 0 1-2.33-2.34V5.67a2.33 2.33 0 0 1 2.33-2.34h2.34v7.34H5.33z" fill="#0ACF83" />
              <path d="M5.33 3.33h2.34v4.67H5.33a2.33 2.33 0 1 1 0-4.67z" fill="#A259FF" />
              <path d="M10.67 8H7.67V3.33h3a2.33 2.33 0 0 1 0 4.67z" fill="#1ABCFE" />
              <path d="M10.67 8a2.33 2.33 0 1 1 0 4.67A2.33 2.33 0 0 1 10.67 8z" fill="#1ABCFE" />
              <path d="M7.67 8h3v4.67h-3A2.33 2.33 0 0 1 7.67 8z" fill="#F24E1E" />
            </svg>
            <span id="colorEditCopyFigmaLabel">Copy to Figma</span>
          </button>
        </div>
      </div>
    </dialog>

    <template id="assetCardTemplate">
      <article class="asset-card" tabindex="0">
        <div class="preview-shell">
          <div class="preview-area"></div>
          <div class="download-overlay" aria-label="미리보기 작업">
            <button type="button" class="edit-json-btn hidden" aria-label="JSON 색상 수정">
              <img class="edit-json-btn-icon" src="./assets/ic_edit.svg" alt="" width="14" height="14" />
            </button>
            <div class="download-overlay-bottom">
              <div class="download-button-wrap">
                <a class="download-option download-json" href="#" download aria-label="JSON 파일 다운로드">
                  <img class="download-option-icon" src="./assets/ic_download.svg" alt="" width="14" height="14" />
                  <span class="download-option-label">JSON</span>
                </a>
                <a class="download-option download-png hidden" href="#" download aria-label="PNG 파일 다운로드">
                  <img class="download-option-icon" src="./assets/ic_download.svg" alt="" width="14" height="14" />
                  <span class="download-option-label">PNG</span>
                </a>
              </div>
            </div>
          </div>
        </div>
        <div class="card-text-group">
          <p class="shared-note"></p>
          <div class="tag-list"></div>
        </div>
      </article>
    </template>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
    <script src="./app.js" type="module"></script>
  </body>
</html>
