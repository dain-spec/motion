<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WEHAGO Logo Preview</title>
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
        background: transparent;
      }

      #lottie {
        width: 100%;
        height: 100%;
      }
    </style>
  </head>
  <body>
    <div id="lottie" aria-label="WEHAGO 로고 미리보기"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
    <script>
      lottie.loadAnimation({
        container: document.getElementById("lottie"),
        renderer: "svg",
        loop: true,
        autoplay: true,
        path: "./json/logo_wehago.json",
      });
    </script>
  </body>
</html>
